<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Game Played - GameZone</title>
<link rel="stylesheet" href="addgames.css">
</head>

<body>

<header class="navbar">
<h2 class="logo" onclick="goHome()">GameZone</h2>

<div class="nav-user">
<img id="navAvatar" class="avatar">
<span id="navUsername"></span>
</div>
</header>


<main>

<div class="card">

<h2>Add Game Played</h2>

<form id="gameForm">

<label>Game Name</label>
<input id="gamename" required placeholder="Enter game name">


<label>Game Tags (comma separated)</label>
<input id="gametags" placeholder="battle royal, fps">


<label>Platform</label>
<select id="platform" required>

<option value="">Select platform</option>
<option value="pc">PC</option>
<option value="mobile">Mobile</option>
<option value="console">Console</option>

</select>


<label>Times Completed</label>
<input id="completed" type="number" value="1">


<label>Star Rating</label>

<div id="starContainer" class="stars">
<span data-value="1">⭐</span>
<span data-value="2">⭐</span>
<span data-value="3">⭐</span>
<span data-value="4">⭐</span>
<span data-value="5">⭐</span>
</div>


<label>Review</label>
<textarea id="review" placeholder="Write your review..."></textarea>


<button type="submit" class="submit-btn">
Submit Review
</button>

</form>

</div>

</main>

<div id="toast"></div>

<script src="addgames.js"></script>

</body>
</html>
