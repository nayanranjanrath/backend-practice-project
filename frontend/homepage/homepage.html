<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="homepage.css">
</head>

<body>

  <!-- NAVBAR -->
 <header class="navbar">

  <!-- LEFT -->
  <div class="nav-left">
    <h2 class="logo">GameZone</h2>
  </div>

  <!-- LEFT-CENTER (Post + Explore) -->
  <div class="nav-mid-left">
    <button class="post-btn" onclick="goToPost()">+ Post</button>
    <button class="explore-btn" onclick="goToExplore()">Explore</button>
  </div>

  <!-- CENTER SEARCH -->
  <div class="nav-center">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search games or players..." />
      <button onclick="goToSearch()">Search</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">

    <button class="chat-btn" onclick="goToChat()">Chat</button>

    <button class="recruit-btn" onclick="goToRecruit()">Recruit</button>

    <button class="recruiting-btn" onclick="goToAllRecruiting()">join</button>

    <div class="profile-section" onclick="goToProfile()">
      <img src="avatar.png" class="avatar">
      <span id="usernameDisplay">Loading...</span>
    </div>

  </div>

</header>
  <!-- MAIN CONTENT -->
  <main>
    <h1>Upcoming Games</h1>
    <div id="gamesContainer" class="games-grid"></div>
  </main>

  <script src="homepage.js"></script>

</body>
</html>
