<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GameZone Profile</title>
<link rel="stylesheet" href="profile.css">
</head>

<body>

<header class="navbar">

<h2 class="logo" onclick="goHome()">GameZone</h2>

<div class="nav-user">
    <div class="nav-user">
<img id="navAvatar" class="avatar">
<span id="navUsername"></span>

<button onclick="logout()" class="logout-btn">Logout</button>
</div>
<img id="navAvatar" class="avatar">
<span id="navUsername"></span>
</div>

</header>


<!-- GAMER BANNER -->

<section id="banner" class="banner"></section>


<!-- PROFILE HEADER -->

<section class="profile-header">

<div id="avatarRing" class="avatar-ring">
<img id="profileAvatar" class="profile-avatar">
</div>

<h1 id="profileUsername"></h1>
<p id="profileFullname"></p>

<div id="rankBadge" class="rank-badge"></div>
<div id="gamesBadge" class="games-badge"></div>

<div class="rank-progress-container">

<div class="rank-bar">
<div id="rankProgress" class="rank-progress"></div>
</div>

<p id="nextRankText" class="next-rank"></p>

</div>

</section>


<main class="profile-layout">

<section class="posts-section">

<h2 class="section-title">Player Highlights</h2>

<div id="postsContainer" class="posts-grid"></div>

</section>


<aside class="profile-side">

<div class="profile-card">

<div class="stats">

<div class="stat clickable" onclick="showgames()">
<span id="gamesCount"></span>
<p>🎮 Games</p>
</div>

<div class="stat clickable" onclick="showfollowers()">
<span id="followersCount"></span>
<p>👥 Followers</p>
</div>

<div class="stat">
<span id="followingCount"></span>
<p>➡ Following</p>
</div>

</div>

<button id="followBtn" class="follow-btn"></button>

</div>

</aside>

</main>

<script src="profile.js"></script>

</body>
</html>
